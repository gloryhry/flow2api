version: '3.8'

services:
  flow2api-headed:
    build:
      context: .
      dockerfile: Dockerfile.headed
    image: flow2api:headed
    container_name: flow2api-headed
    ports:
      - "8000:8000"
      - "${HEADED_BIND_HOST:-127.0.0.1}:${VNC_HOST_PORT:-5900}:5900"
      - "${HEADED_BIND_HOST:-127.0.0.1}:${NOVNC_HOST_PORT:-6080}:6080"
    volumes:
      - ./data:/app/data
      - ./config/setting.toml:/app/config/setting.toml
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - XVFB_WHD=1920x1080x24
      - VNC_PORT=5900
      - NOVNC_PORT=6080
      - VNC_PASSWORD=${VNC_PASSWORD:?VNC_PASSWORD is required}
    shm_size: "2gb"
    restart: unless-stopped
